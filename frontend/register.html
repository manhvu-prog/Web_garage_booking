<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCare – Đăng ký</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a56e8 0%, #2563eb 50%, #1a56e8 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .register-wrapper { width: 100%; max-width: 480px; padding: 20px; }
    .register-card {
      background: white; border-radius: 16px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .brand-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px; background: #2563eb; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px; flex-shrink: 0;
    }
    .brand-name { font-size: 22px; font-weight: 800; color: #0f172a; line-height: 1.2; }
    .brand-sub  { font-size: 12px; color: #94a3b8; }
    .form-title { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; color: #0f172a; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-control::placeholder { color: #b0bac9; }
    .form-control:focus { border-color: #2563eb; }
    .form-control.error { border-color: #dc2626; }
    .field-error { font-size: 12px; color: #dc2626; margin-top: 4px; display: none; }
    .btn-register {
      width: 100%; padding: 13px; background: #2563eb; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .2s; margin-bottom: 16px;
    }
    .btn-register:hover { background: #1d4ed8; }
    .login-row { text-align: center; font-size: 13px; color: #64748b; }
    .login-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .alert-success {
      display: none; background: #dcfce7; border: 1px solid #86efac;
      border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #16a34a;
      margin-bottom: 16px; align-items: center; gap: 8px;
    }
    .help-btn {
      position: fixed; bottom: 20px; right: 20px;
      width: 40px; height: 40px; background: rgba(0,0,0,0.2);
      border-radius: 50%; border: none; color: white; font-size: 16px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="register-wrapper">
  <div class="register-card">
    <div class="brand-row">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      <div>
        <div class="brand-name">AutoCare</div>
        <div class="brand-sub">Garage Booking</div>
      </div>
    </div>
    <div class="form-title">Đăng ký tài khoản</div>
    <div class="alert-success" id="reg-success">
      <i class="bi bi-check-circle-fill"></i>
      <span>Đăng ký thành công! Đang chuyển hướng...</span>
    </div>
    <div class="form-group">
      <label class="form-label">Họ và tên</label>
      <input class="form-control" id="reg-name" type="text" placeholder="Nguyễn Văn A">
      <div class="field-error" id="err-name">Vui lòng nhập họ và tên</div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" id="reg-email" type="email" placeholder="your@email.com">
      <div class="field-error" id="err-email">Vui lòng nhập email hợp lệ</div>
    </div>
    <div class="form-group">
      <label class="form-label">Số điện thoại</label>
      <input class="form-control" id="reg-phone" type="tel" placeholder="0901234567">
      <div class="field-error" id="err-phone">Vui lòng nhập số điện thoại</div>
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <input class="form-control" id="reg-pw" type="password" placeholder="••••••••">
      <div class="field-error" id="err-pw">Mật khẩu tối thiểu 6 ký tự</div>
    </div>
    <button class="btn-register" onclick="doRegister()">Đăng ký</button>
    <div class="login-row">
      Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
    </div>
  </div>
</div>
<button class="help-btn">?</button>
<script>
  function doRegister() {
    let valid = true;
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const phone = document.getElementById('reg-phone').value.trim();
    const pw    = document.getElementById('reg-pw').value;

    // Reset errors
    ['name','email','phone','pw'].forEach(f => {
      document.getElementById('reg-' + f).classList.remove('error');
      document.getElementById('err-' + f).style.display = 'none';
    });

    if (!name) {
      document.getElementById('reg-name').classList.add('error');
      document.getElementById('err-name').style.display = 'block';
      valid = false;
    }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('reg-email').classList.add('error');
      document.getElementById('err-email').style.display = 'block';
      valid = false;
    }
    if (!phone || phone.length < 9) {
      document.getElementById('reg-phone').classList.add('error');
      document.getElementById('err-phone').style.display = 'block';
      valid = false;
    }
    if (!pw || pw.length < 6) {
      document.getElementById('reg-pw').classList.add('error');
      document.getElementById('err-pw').style.display = 'block';
      valid = false;
    }

    if (valid) {
      document.getElementById('reg-success').style.display = 'flex';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
