<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCare – Nhân viên</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/staff.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
<div class="app-layout">

  <!-- partials/shared/sidebar-staff.html -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      <div><div class="brand-name">AutoCare</div><div class="brand-sub">Garage Booking</div></div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" onclick="showPage('today')"><i class="bi bi-calendar-day"></i> Lịch làm việc hôm nay</a>
      <a class="nav-item" onclick="showPage('my-history')"><i class="bi bi-clock-history"></i> Lịch sử xe đã phụ trách</a>
    </nav>
  </aside>

  <div class="main-content">

    <!-- partials/shared/topbar-staff.html -->
    <header class="topbar">
      <div class="search-box"><i class="bi bi-search"></i><input type="text" placeholder="Tìm kiếm xe, khách hàng..."></div>
      <div class="topbar-actions">
        <button class="btn-icon"><i class="bi bi-bell"></i><span class="badge-dot"></span></button>
        <div class="dropdown">
          <button class="user-menu" onclick="toggleDropdown('dd-staff')">
            <div class="user-avatar" style="background:#0891b2">T</div>
            <div><div class="user-name">Trần Thị B</div><div class="user-role">Nhân viên</div></div>
            <i class="bi bi-chevron-down" style="font-size:12px;color:#94a3b8;margin-left:4px"></i>
          </button>
          <div class="dropdown-menu" id="dd-staff">
            <div class="dropdown-divider"></div>
            <a class="dropdown-item danger" href="login.html"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a>
          </div>
        </div>
      </div>
    </header>

    <div class="page-content">

      <!-- partials/staff/page-today.html -->
      <div class="page active" id="page-today">
        <div class="page-header d-flex justify-between align-center">
          <div><div class="page-title">Lịch làm việc hôm nay</div><div class="page-subtitle">Thứ Ba, 10/03/2026</div></div>
          <span class="badge badge-success" style="font-size:13px;padding:6px 14px"><i class="bi bi-circle-fill" style="font-size:8px;margin-right:4px"></i>Đang làm việc</span>
        </div>
        <div id="staff-slots-container"></div>
      </div>

      <!-- partials/staff/page-my-history.html -->
      <div class="page" id="page-my-history">
        <div class="page-header"><div class="page-title">Lịch sử xe đã phụ trách</div><div class="page-subtitle">Các xe đã xử lý</div></div>
        <div class="card">
          <div class="card-header"><span class="card-title">Danh sách xe đã phụ trách</span></div>
          <div class="table-wrapper"><table><thead><tr><th>Biển số</th><th>Khách hàng</th><th>Khung giờ</th><th>Dịch vụ</th><th>Trạng thái</th><th>Ghi chú</th></tr></thead><tbody id="staff-history-tbody"></tbody></table></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/modal-loader.js"></script>
<script>
  loadModals([
    'partials/modals/staff/modal-assign.html',
    'partials/modals/staff/modal-complete.html'
  ]);
</script>
<script src="js/staff.js"></script>
</body>
</html>
