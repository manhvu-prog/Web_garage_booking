<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCare – Đăng nhập</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a56e8 0%, #2563eb 50%, #1a56e8 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-wrapper { width: 100%; max-width: 480px; padding: 20px; }
    .login-card {
      background: white; border-radius: 16px;
      padding: 40px 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .brand-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px; height: 48px; background: #2563eb; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px; flex-shrink: 0;
    }
    .brand-name { font-size: 22px; font-weight: 800; color: #0f172a; line-height: 1.2; }
    .brand-sub  { font-size: 12px; color: #94a3b8; }
    .form-title { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; color: #0f172a; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-control::placeholder { color: #b0bac9; }
    .form-control:focus { border-color: #2563eb; }
    .row-remember {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .check-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151; cursor: pointer; }
    .check-label input[type="checkbox"] { width: 17px; height: 17px; accent-color: #2563eb; cursor: pointer; }
    .forgot-link { font-size: 13px; font-weight: 600; color: #2563eb; text-decoration: none; }
    .btn-login {
      width: 100%; padding: 13px; background: #2563eb; color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .register-row { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
    .register-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
    .demo-label { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
    .demo-btns { display: flex; gap: 10px; justify-content: center; }
    .demo-btn {
      flex: 1; padding: 9px 0; background: #f1f5f9;
      border: 1.5px solid #e2e8f0; border-radius: 20px;
      font-size: 13px; font-weight: 600; color: #374151;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .demo-btn:hover { background: #e0e7ef; }
    .alert-error {
      display: none; background: #fee2e2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #dc2626;
      margin-bottom: 16px; align-items: center; gap: 8px;
    }
    .help-btn {
      position: fixed; bottom: 20px; right: 20px;
      width: 40px; height: 40px; background: rgba(0,0,0,0.2);
      border-radius: 50%; border: none; color: white; font-size: 16px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-row">
      <div class="brand-icon"><i class="bi bi-car-front-fill"></i></div>
      <div>
        <div class="brand-name">AutoCare</div>
        <div class="brand-sub">Garage Booking</div>
      </div>
    </div>
    <div class="form-title">Đăng nhập</div>
    <div class="alert-error" id="login-error">
      <i class="bi bi-exclamation-circle"></i>
      <span id="error-msg"></span>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" id="login-email" type="email" placeholder="your@email.com" value="a@gmail.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <input class="form-control" id="login-pw" type="password" placeholder="••••••••" value="123456">
    </div>
    <div class="row-remember">
      <label class="check-label">
        <input type="checkbox" checked> Ghi nhớ đăng nhập
      </label>
    
    </div>
    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
    <div class="register-row">
      Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
    </div>
    <hr class="divider">
    <div class="demo-btns">
      <button class="demo-btn" onclick="fillDemo('a@gmail.com','123456')">Khách hàng</button>
      <button class="demo-btn" onclick="fillDemo('b@gmail.com','123456')">Nhân viên</button>
      <button class="demo-btn" onclick="fillDemo('admin@autocare.vn','admin123')">Admin</button>
    </div>
  </div>
</div>
<button class="help-btn">?</button>
<script>
  const accounts = [
    { email: 'a@gmail.com',       pw: '123456',   redirect: 'index.html' },
    { email: 'b@gmail.com',       pw: '123456',   redirect: 'staff.html' },
    { email: 'admin@autocare.vn', pw: 'admin123', redirect: 'admin.html' },
  ];
  function fillDemo(email, pw) {
    document.getElementById('login-email').value = email;
    document.getElementById('login-pw').value = pw;
    document.getElementById('login-error').style.display = 'none';
  }
  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-pw').value;
    const acc   = accounts.find(a => a.email === email && a.pw === pw);
    if (acc) {
      window.location.href = acc.redirect;
    } else {
      const err = document.getElementById('login-error');
      err.style.display = 'flex';
      document.getElementById('error-msg').textContent = 'Email hoặc mật khẩu không đúng';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
