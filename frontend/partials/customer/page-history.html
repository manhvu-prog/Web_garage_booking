<div class="page" id="page-history">
  <div class="page-header">
    <div class="page-title">Lịch sử bảo dưỡng</div>
    <div class="page-subtitle">Hồ sơ bảo dưỡng và quản lý lịch hẹn</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
    <div class="card">
      <div class="card-header"><span class="card-title">Tất cả lịch hẹn</span></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>Ngày</th><th>Xe</th><th>Dịch vụ</th><th>Trạng thái</th><th>Thao tác</th></tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Dòng thời gian</span></div>
      <div class="card-body">
        <div class="record-timeline" id="history-timeline"></div>
      </div>
    </div>
  </div>
</div>
