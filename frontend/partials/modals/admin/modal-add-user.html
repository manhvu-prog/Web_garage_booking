<div class="modal-overlay"
     id="modal-add-user"
     style="display:none"
     onclick="closeModalOuter(event,'modal-add-user')">
  <div class="modal">

    <div class="modal-header">
      <span class="modal-title">
        <i class="bi bi-person-plus" style="color:var(--primary)"></i> Thêm người dùng
      </span>
      <button class="modal-close" onclick="closeModal('modal-add-user')">&times;</button>
    </div>

    <div class="modal-body">

      <div class="form-group">
        <label class="form-label">Họ tên <span style="color:red">*</span></label>
        <input class="form-control" id="u-name" placeholder="Nhập họ tên">
      </div>

      <div class="form-group">
        <label class="form-label">Email <span style="color:red">*</span></label>
        <input class="form-control" id="u-email" type="email" placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Điện thoại <span style="color:red">*</span></label>
        <input class="form-control" id="u-phone" placeholder="09xx...">
      </div>

      <div class="form-group">
        <label class="form-label">Vai trò</label>
        <select class="form-control" id="u-role">
          <option value="khach_hang">Khách hàng</option>
          <option value="nhan_vien">Nhân viên</option>
          <option value="quan_tri">Quản trị viên</option>
        </select>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add-user')">Hủy</button>
      <button class="btn btn-primary" onclick="addUser()">
        <i class="bi bi-plus"></i> Thêm
      </button>
    </div>

  </div>
</div>
