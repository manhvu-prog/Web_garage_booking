<div class="page" id="page-users">
  <div class="page-header d-flex justify-between align-center">
    <div>
      <div class="page-title">Quản lý người dùng</div>
      <div class="page-subtitle">Danh sách tài khoản hệ thống</div>
    </div>
    <button class="btn btn-primary" onclick="openModal('modal-add-user')">
      <i class="bi bi-person-plus"></i> Thêm người dùng
    </button>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="tabs" style="border:none;margin:0">
        <button class="tab-btn active" onclick="filterUsers('all', this)">Tất cả</button>
        <button class="tab-btn" onclick="filterUsers('khach_hang', this)">Khách hàng</button>
        <button class="tab-btn" onclick="filterUsers('nhan_vien', this)">Nhân viên</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Họ tên</th><th>Email</th><th>Điện thoại</th><th>Vai trò</th><th>Trạng thái</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
